<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F5A623">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="悦己镇">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <title>悦己镇 · Joyville — Treat yourself better</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.0/babel.min.js"></script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=a448036028b969a51fe8d6bf016a82b6"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --primary: #F5A623;
  --primary-dark: #E08E0B;
  --accent: #5DBFB4;
  --bg: #FFF8F0;
  --bg-card: #FFFFFF;
  --text: #3D2E1F;
  --text-secondary: #7A6B5D;
  --text-light: #B8A99A;
  --border: #F0E5D8;
  --success: #5DBFB4;
  --gold: #F5A623;
  --sand: #FFECD2;
  --shadow: 0 2px 12px rgba(61,46,31,0.06);
  --radius: 12px;
  --radius-sm: 8px;
}

[data-theme="dark"] {
  --primary: #F7B84D;
  --primary-dark: #F5A623;
  --accent: #6FD4C8;
  --bg: #1F1A15;
  --bg-card: #2A231C;
  --text: #F0E8DD;
  --text-secondary: #B8A99A;
  --text-light: #7A6B5D;
  --border: #3D2E1F;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

#root {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  background: var(--bg-card);
  overflow-x: hidden;
}

/* Utility */
.row { display:flex; flex-direction:row; align-items:center; }
.col { display:flex; flex-direction:column; }
.gap-8 { gap:8px; }
.gap-12 { gap:12px; }
.flex-1 { flex:1; }
.text-center { text-align:center; }
.mt-8 { margin-top:8px; }
.mt-16 { margin-top:16px; }
.p-16 { padding:16px; }
.px-16 { padding-left:16px; padding-right:16px; }

/* Animations */
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); }
  50% { transform:scale(1.05); }
}
@keyframes slideInRight {
  from { transform:translateX(100%); }
  to { transform:translateX(0); }
}
@keyframes confetti {
  0% { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(-200px) rotate(720deg); opacity:0; }
}
@keyframes shimmer {
  0% { background-position:-200% 0; }
  100% { background-position:200% 0; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.animate-in { animation: fadeInUp 0.4s ease-out; }
.btn-pulse { animation: pulse 2s infinite; }

/* Toast */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  background:#1A1A1A; color:#FFF; padding:12px 24px; border-radius:24px;
  font-size:14px; z-index:999; animation:fadeInUp 0.3s ease-out;
}

.app-header {
  position:sticky; top:0; z-index:100;
  background: var(--bg-card);
  color:#FFF; padding:0;
  padding-top: max(0px, env(safe-area-inset-top));
}
.app-header h1 { font-size:18px; font-weight:600; letter-spacing:0.5px; }
.app-header .subtitle { font-size:11px; opacity:0.85; margin-top:2px; }

.header-actions { display:flex; gap:8px; align-items:center; }
.header-btn {
  background:rgba(255,255,255,0.2); border:none; color:#FFF;
  padding:6px 10px; border-radius:6px; font-size:12px; cursor:pointer;
  font-family:inherit; white-space:nowrap;
}

/* Food Cards */
.food-card {
  background:var(--bg-card); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden; cursor:pointer;
  transition: transform 0.2s;
}
.food-card:active { transform:scale(0.98); }
.food-card-img {
  width:100%; height:140px; object-fit:cover;
  background: linear-gradient(135deg, #FFE0D5, #FFF0E8);
}
.food-card-body { padding:10px 12px; }
.food-card-name { font-size:14px; font-weight:500; margin-bottom:4px; }
.food-card-price { color:var(--primary); font-weight:700; font-size:15px; }
.food-card-price .original { color:var(--text-light); font-size:11px; text-decoration:line-through; margin-left:6px; font-weight:400; }
.food-card-meta { font-size:11px; color:var(--text-secondary); margin-top:2px; }

/* Store Card */
.store-card {
  display:flex; gap:12px; padding:14px 16px; background:var(--bg-card);
  border-bottom:1px solid var(--border); cursor:pointer;
}
.store-card:active { background:var(--bg); }
.store-card-img {
  width:72px; height:72px; border-radius:var(--radius-sm);
  object-fit:cover; background:linear-gradient(135deg, #FFE0D5, #FFF0E8);
}
.store-card-info { flex:1; }
.store-card-name { font-size:15px; font-weight:600; margin-bottom:4px; }
.store-card-stars { color:var(--gold); font-size:12px; }
.store-card-type { font-size:11px; color:var(--text-secondary); margin-top:2px; }
.store-card-tag {
  display:inline-block; background:#FFF0E8; color:var(--primary);
  font-size:10px; padding:2px 6px; border-radius:4px; margin-top:4px;
}

/* Cart */
.cart-fab {
  position:fixed; bottom:90px; right:16px;
  width:56px; height:56px; border-radius:28px;
  background:var(--primary); color:#FFF; border:none;
  font-size:22px; cursor:pointer; box-shadow:0 4px 16px rgba(255,93,55,0.4);
  z-index:90; display:flex; align-items:center; justify-content:center;
}
.cart-badge {
  position:absolute; top:-4px; right:-4px;
  background:#FF0000; color:#FFF; font-size:11px;
  min-width:20px; height:20px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
}

.cart-panel {
  position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
  background:var(--bg-card); border-radius:20px 20px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,0.1);
  z-index:95; max-height:60vh; overflow-y:auto;
  animation: slideInRight 0.3s ease-out;
}
.cart-panel-header {
  padding:16px; border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  position:sticky; top:0; background:var(--bg-card); z-index:1;
}
.cart-item {
  display:flex; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border);
  align-items:center;
}
.cart-item-name { flex:1; font-size:13px; }
.cart-item-price { color:var(--primary); font-weight:600; font-size:14px; }
.cart-item-qty { display:flex; align-items:center; gap:8px; }
.qty-btn {
  width:26px; height:26px; border-radius:13px; border:1px solid var(--border);
  background:var(--bg); cursor:pointer; font-size:14px; display:flex;
  align-items:center; justify-content:center;
}
.cart-footer {
  padding:14px 16px; border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  position:sticky; bottom:0; background:var(--bg-card);
}
.cart-total { font-size:14px; }
.cart-total .price { color:var(--primary); font-weight:700; font-size:18px; }
.btn-checkout {
  background:var(--primary); color:#FFF; border:none;
  padding:12px 32px; border-radius:24px; font-size:15px; font-weight:600;
  cursor:pointer; font-family:inherit;
}

/* Checkout */
.checkout-page { height:100vh; height:100dvh; display:flex; flex-direction:column; }
.checkout-stepper {
  display:flex; justify-content:center; gap:4px; padding:20px 0 0;
}
.step-dot {
  width:8px; height:8px; border-radius:4px; background:var(--border);
}
.step-dot.active { background:var(--primary); width:24px; }
.step-dot.done { background:var(--success); }
.checkout-content { flex:1; overflow-y:auto; padding:24px 16px; }
.checkout-address {
  background:var(--bg); padding:14px; border-radius:var(--radius-sm);
  display:flex; gap:10px; align-items:center; margin-bottom:16px;
}
.checkout-pay-method {
  display:flex; gap:12px; flex-wrap:wrap;
}
.pay-option {
  flex:1; min-width:80px; padding:16px 12px; border:2px solid var(--border);
  border-radius:var(--radius-sm); text-align:center; cursor:pointer;
  font-size:13px;
}
.pay-option.selected { border-color:var(--primary); background:#FFF5F0; }

/* Order Success */
.success-page {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100vh; height:100dvh;
  padding:32px; text-align:center;
}
.success-icon { font-size:72px; animation:pulse 1.5s ease-in-out; }
.success-title { font-size:22px; font-weight:700; margin:16px 0 8px; }
.success-saved { color:var(--primary); font-weight:700; font-size:32px; margin:12px 0; }
.success-subtitle { color:var(--text-secondary); font-size:14px; margin-bottom:24px; }
.confetti {
  position:absolute; font-size:24px; animation:confetti 2s ease-out forwards;
  opacity:0;
}

/* Stats Bar */
.stats-bar {
  display:flex; justify-content:space-around; padding:14px 16px;
  background:var(--bg); border-radius:var(--radius);
  margin:12px 16px;
}
.stat-item { text-align:center; }
.stat-value { font-size:20px; font-weight:700; color:var(--primary); }
.stat-label { font-size:11px; color:var(--text-secondary); margin-top:2px; }

/* Category tabs */
.cat-tabs {
  display:flex; overflow-x:auto; padding:12px 16px; gap:10px;
  scrollbar-width:none;
}
.cat-tabs::-webkit-scrollbar { display:none; }
.cat-tab {
  padding:8px 18px; border-radius:20px; font-size:13px;
  white-space:nowrap; cursor:pointer; border:1px solid var(--border);
  background:var(--bg); color:var(--text-secondary);
}
.cat-tab.active { background:var(--primary); color:#FFF; border-color:var(--primary); }

/* Store header */
.store-header {
  position:relative; height:180px; overflow:hidden;
}
.store-header-bg {
  width:100%; height:100%; object-fit:cover;
  background:linear-gradient(135deg, #FF5D37, #FF8D58);
}
.store-header-info {
  position:absolute; bottom:0; left:0; right:0;
  padding:16px; background:linear-gradient(transparent, rgba(0,0,0,0.6));
  color:#FFF;
}
.store-header-name { font-size:20px; font-weight:700; }
.store-header-meta { font-size:12px; opacity:0.9; margin-top:4px; }
.store-header-tags { margin-top:4px; display:flex; gap:4px; flex-wrap:wrap; }
.store-header-tag {
  background:rgba(255,255,255,0.25); color:#FFF;
  font-size:10px; padding:2px 8px; border-radius:10px;
}

/* Loading skeleton */
.skeleton {
  background:linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
  border-radius:var(--radius-sm);
}

/* Install PWA prompt */
.pwa-banner {
  position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
  background:var(--bg-card); padding:14px 16px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.15);
  display:flex; gap:12px; align-items:center; z-index:200;
  animation:fadeInUp 0.4s ease-out;
}
.pwa-banner-text { flex:1; font-size:13px; font-weight:500; }
.pwa-banner-btn {
  background:var(--primary); color:#FFF; border:none;
  padding:8px 16px; border-radius:18px; font-size:13px;
  font-weight:600; cursor:pointer; font-family:inherit;
}
.pwa-banner-close {
  background:none; border:none; color:var(--text-light); cursor:pointer;
  font-size:18px; padding:4px;
}

/* Bottom Tab Bar */
.tab-bar {
  position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
  background:var(--bg-card); border-top:1px solid var(--border);
  display:flex; z-index:85; padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -2px 12px rgba(0,0,0,0.06);
}
.tab-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:8px 0 4px; cursor:pointer;
  border:none; background:transparent; font-family:inherit;
  font-size:11px; color:var(--text-light); gap:4px;
  transition:color 0.2s; -webkit-tap-highlight-color:transparent;
}
.tab-item .tab-icon { font-size:22px; line-height:1; }
.tab-item.active { color:var(--primary); font-weight:600; }

/* Logo */
.app-logo { display:flex; align-items:center; gap:10px; }
.app-logo svg { flex-shrink:0; }

/* Product Cards (Shopping) */
.product-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px;
}
.product-card {
  background:var(--bg-card); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden; cursor:pointer;
  transition: transform 0.2s;
}
.product-card:active { transform:scale(0.98); }
.product-img-wrap {
  position:relative; width:100%; height:160px; overflow:hidden;
  background:linear-gradient(135deg, #F5F5F5, #E8E8E8);
}
.product-img {
  width:100%; height:100%; object-fit:cover;
}
.product-img-fallback {
  width:100%; height:100%; display:flex; align-items:center;
  justify-content:center; font-size:48px;
  background:linear-gradient(135deg, #FFE0D5, #FFF0E8);
}
.brand-badge {
  position:absolute; top:8px; left:8px;
  background:rgba(0,0,0,0.7); color:#FFF; font-size:10px;
  padding:2px 8px; border-radius:4px; font-weight:500;
  backdrop-filter:blur(4px);
}
.product-body { padding:10px 12px; }
.product-name { font-size:13px; font-weight:500; margin-bottom:6px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden; line-height:1.4; min-height:36px;
}
.product-price-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.product-price { color:var(--primary); font-weight:700; font-size:16px; }
.product-price .original {
  color:var(--text-light); font-size:11px; text-decoration:line-through;
  font-weight:400; margin-left:4px;
}
.product-specs { font-size:10px; color:var(--text-light); margin-bottom:8px; }
.product-specs span {
  display:inline-block; background:var(--bg); padding:1px 6px;
  border-radius:3px; margin-right:4px; margin-bottom:2px;
}
.btn-add-cart {
  width:100%; padding:8px 0; border-radius:6px; border:1px solid var(--primary);
  background:transparent; color:var(--primary); font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:all 0.2s;
}
.btn-add-cart:hover, .btn-add-cart:active {
  background:var(--primary); color:#FFF;
}
.btn-add-cart.added {
  background:var(--success); color:#FFF; border-color:var(--success);
}

/* Empty state */
.empty-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:60px 20px; text-align:center;
}
.empty-state-icon { font-size:56px; margin-bottom:16px; }
.empty-state-text { color:var(--text-secondary); font-size:14px; }
.empty-state-hint { color:var(--text-light); font-size:12px; margin-top:6px; }

/* Loading shimmer for product cards */
.product-card-skeleton {
  background:var(--bg-card); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden;
}
.product-card-skeleton .skeleton-img {
  width:100%; height:160px;
}
.product-card-skeleton .skeleton-body {
  padding:10px 12px; display:flex; flex-direction:column; gap:8px;
}
.product-card-skeleton .skeleton-line {
  height:12px; border-radius:6px;
}
  </style>

  function normRestaurant(r) {
    return {
      id: r.id,

      name_en: r.name_en,
      tags: r.tags || [],
      rating: r.rating,
      category: r.category,
      deliveryTime: r.delivery_time || r.deliveryTime,

      address: r.address,
      image: (typeof r.image === 'string' && (r.image.indexOf('http') === 0 || r.image.indexOf('https') === 0)) ? r.image : (r.image && r.image.indexOf('http') !== 0 ? null : null),
      emoji: r.emoji || r.image,
      desc: r.description || r.desc,
      menu: (r.menu || []).map(function(item) {
        return {
          id: item.name,
          name: item.name,
          desc: item.desc,
          price: item.price,
          image: (typeof item.image === 'string' && (item.image.indexOf('http') === 0 || item.image.indexOf('https') === 0)) ? item.image : null,
          emoji: item.emoji,
          originalPrice: item.original_price || item.originalPrice
        };
      }),
      color: r.color
    };
  }

  function fmtMoney(n) {
    if (n >= 10000) return '¥' + (n / 10000).toFixed(1) + '万';
    if (n >= 1000) return '¥' + (n / 1000).toFixed(1) + 'k';
    return '¥' + n;
  }

  // ===== StatsBar =====
  function StatsBar() {
    var statsState = React.useState({ saved: 0, orders: 0, streak: 0 });
    var stats = statsState[0], setStats = statsState[1];

    React.useEffect(function() {
      function loadStats() {
        setStats({
          saved: parseFloat(localStorage.getItem('dopamine_saved') || '0'),
          orders: parseInt(localStorage.getItem('dopamine_orders') || '0', 10),
          streak: parseInt(localStorage.getItem('dopamine_streak') || '0', 10)
        });
      }
      loadStats();

      var handleStorage = function(e) {
        if (e.key && e.key.indexOf('dopamine_') === 0) loadStats();
      };
      window.addEventListener('storage', handleStorage);
      window.addEventListener('statsupdate', loadStats);

      return function() {
        window.removeEventListener('storage', handleStorage);
        window.removeEventListener('statsupdate', loadStats);
      };
    }, []);

    function formatMoney(amount) {
      if (amount >= 10000) return '¥' + (amount / 10000).toFixed(1) + '万';
      return '¥' + amount.toFixed(0);
    }

    return h('div', { className: 'stats-bar animate-in' },
      h('div', { className: 'stat-item' },
        h('div', { className: 'stat-value' }, formatMoney(stats.saved)),
        h('div', { className: 'stat-label' }, window.T('stats.saved'))

      h('div', { className: 'stat-item' },

  // ===== StoreReviews — 评价系统 =====
  function StoreReviews(props) {
    var store = props.store;
    var storeId = props.storeId;

    // Load reviews: localStorage first, then store data
    var reviewsState = React.useState(function() {
      var localKey = 'joyville_reviews_' + storeId;
      try {
        var saved = localStorage.getItem(localKey);
        if (saved) return JSON.parse(saved);
      } catch(e) {}
      // Fall back to store.reviews if available
      return (store && store.reviews) ? store.reviews : [];
    });
    var reviews = reviewsState[0], setReviews = reviewsState[1];

    // Save to localStorage when reviews change
    React.useEffect(function() {
      try {
        localStorage.setItem('joyville_reviews_' + storeId, JSON.stringify(reviews));
      } catch(e) {}
    }, [reviews, storeId]);

    // Form state
    var ratingState = React.useState(5);
    var rating = ratingState[0], setRating = ratingState[1];
    var hoverState = React.useState(0);
    var hoverRating = hoverState[0], setHoverRating = hoverState[1];
    var contentState = React.useState('');
    var content = contentState[0], setContent = contentState[1];
    var userState = React.useState('匿名吃货');
    var user = userState[0], setUser = userState[1];
    var submittedState = React.useState(false);
    var submitted = submittedState[0], setSubmitted = submittedState[1];

    var handleSubmit = React.useCallback(function() {
      if (!content.trim()) return;
      var newReview = {
        user: user.trim() || '匿名吃货',
        rating: rating,
        date: new Date().toISOString().slice(0, 10),
        content: content.trim()
      };
      setReviews(function(prev) { return [newReview].concat(prev); });
      setContent('');
      setRating(5);
      setSubmitted(true);
      setTimeout(function() { setSubmitted(false); }, 2000);
    }, [content, rating, user]);

    // Render star rating
    function renderStars(current, interactive, onChange, onHover) {
      var stars = [];
      for (var s = 1; s <= 5; s++) {
        var filled = s <= (hoverRating || current);
        stars.push(h('span', {
          key: s,
          onClick: interactive ? function() { onChange(s); } : undefined,
          onMouseEnter: interactive ? function() { onHover(s); } : undefined,
          onMouseLeave: interactive ? function() { onHover(0); } : undefined,
          style: {
            cursor: interactive ? 'pointer' : 'default',
            fontSize: interactive ? 28 : 16,
            color: filled ? '#F5A623' : '#DDD',
            transition: 'color 0.15s',
            marginRight: 2
          }
        }, filled ? '★' : '☆'));
      }
      return h('div', { style: { display: 'flex', alignItems: 'center', gap: 0 } }, stars);
    }

    // Average rating
    var avgRating = reviews.length > 0
      ? (reviews.reduce(function(s, r) { return s + (r.rating || 0); }, 0) / reviews.length).toFixed(1)
      : (store.rating || '0');

    return h('div', { style: { paddingBottom: 80 } },
      // Rating summary
      h('div', {
        style: {
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '16px', background: 'var(--bg)', margin: '12px 16px',
          borderRadius: 'var(--radius)'
        }
      },
        h('div', { style: { fontSize: 36, fontWeight: 700, color: 'var(--primary)' } }, String(avgRating)),
        h('div', null,
          renderStars(parseFloat(avgRating), false),
          h('div', { style: { fontSize: 12, color: 'var(--text-light)', marginTop: 4 } },
            reviews.length + ' 条评价'
          )
        )
      ),

      // Write review form
      h('div', {
        style: {
          margin: '0 16px 12px', padding: 14,
          background: 'var(--bg)', borderRadius: 'var(--radius-sm)'
        }
      },
        h('div', { style: { fontSize: 14, fontWeight: 600, marginBottom: 10 } }, '✏️ 写评价'),
        h('input', {
          placeholder: '你的昵称',
          value: user,
          onChange: function(e) { setUser(e.target.value); },
          style: {
            width: '100%', padding: '8px 12px', borderRadius: 6,
            border: '1px solid var(--border)', fontSize: 13,
            marginBottom: 8, fontFamily: 'inherit',
            background: 'var(--bg-card)', color: 'var(--text)'
          }
        }),
        h('div', { style: { marginBottom: 8, display: 'flex', alignItems: 'center', gap: 8 } },
          h('span', { style: { fontSize: 12, color: 'var(--text-light)' } }, '评分:'),
          renderStars(rating, true, setRating, setHoverRating)
        ),
        h('textarea', {
          placeholder: '分享你的体验...',
          value: content,
          onChange: function(e) { setContent(e.target.value); },
          rows: 3,
          style: {
            width: '100%', padding: '8px 12px', borderRadius: 6,
            border: '1px solid var(--border)', fontSize: 13,
            fontFamily: 'inherit', resize: 'vertical',
            background: 'var(--bg-card)', color: 'var(--text)',
            marginBottom: 8
          }
        }),
        h('button', {
          onClick: handleSubmit,
          disabled: !content.trim() || submitted,
          style: {
            padding: '8px 20px', borderRadius: 20,
            border: 'none',
            background: submitted ? 'var(--success)' : (content.trim() ? 'var(--primary)' : 'var(--border)'),
            color: '#FFF', fontSize: 14, fontWeight: 600,
            cursor: content.trim() ? 'pointer' : 'not-allowed',
            fontFamily: 'inherit'
          }
        }, submitted ? '✓ 已提交' : '提交评价')
      ),

      // Reviews list
      h('div', { style: { padding: '0 16px' } },
        reviews.length === 0 ?
          h('div', { style: { textAlign: 'center', padding: '24px 0', color: 'var(--text-light)', fontSize: 13 } },
            '暂无评价，成为第一个评价的人吧~'
          )
        :
          reviews.map(function(review, idx) {
            var initial = (review.user || '匿').charAt(0);
            var bgColors = ['#FF5D37', '#FF8D58', '#F59E0B', '#22C55E', '#3B82F6', '#8B5CF6', '#EC4899'];
            var bgColor = bgColors[idx % bgColors.length];
            return h('div', {
              key: idx,
              style: {
                padding: '12px 0', borderBottom: '1px solid var(--border)',
                display: 'flex', gap: 10
              }
            },
              // Avatar circle with initial
              h('div', {
                style: {
                  width: 36, height: 36, borderRadius: 18,
                  background: bgColor, color: '#FFF',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 14, fontWeight: 700, flexShrink: 0
                }
              }, initial),
              // Review content
              h('div', { style: { flex: 1 } },
                h('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 } },
                  h('span', { style: { fontSize: 13, fontWeight: 600 } }, review.user),
                  h('span', { style: { fontSize: 13, color: '#F5A623' } },
                    '★'.repeat(Math.min(5, review.rating || 5)) + '☆'.repeat(Math.max(0, 5 - (review.rating || 5)))
                  ),
                  h('span', { style: { fontSize: 11, color: 'var(--text-light)', marginLeft: 'auto' } }, review.date)
                ),
                h('div', { style: { fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.5 } }, review.content)
              )
            );
          })
      )
    );
  }
  window.StoreReviews = StoreReviews;

  // ===== CartPanel =====
  function CartPanel(props) {
    var cartItems = props.cartItems || [];

    var panelRef = React.useRef(null);

    React.useEffect(function() {
      if (!visible) return;
      var handler = function(e) {
        if (e.key === 'Escape' && onClose) onClose();
      };
      document.addEventListener('keydown', handler);
      return function() { document.removeEventListener('keydown', handler); };
    }, [visible, onClose]);

    React.useEffect(function() {
      if (visible) {
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = '';
      }
      return function() { document.body.style.overflow = ''; };
    }, [visible]);

    if (!visible) return null;

    var total = cartItems.reduce(function(sum, item) {
      return sum + (item.price || 0) * (item.qty || 0);
    }, 0);

    return h(React.Fragment, null,
      // Backdrop
      h('div', {
        onClick: onClose,
        style: {
          position: 'fixed', inset: 0,
          background: 'rgba(0,0,0,0.35)',

  // ===== PwaBanner =====
  function PwaBanner() {
    var promptState = React.useState(null);
    var deferredPrompt = promptState[0], setDeferredPrompt = promptState[1];
    var visibleState = React.useState(false);
    var visible = visibleState[0], setVisible = visibleState[1];
    var dismissedState = React.useState(false);
    var dismissed = dismissedState[0], setDismissed = dismissedState[1];

    React.useEffect(function() {
      var dismissedTime = localStorage.getItem('dopamine_pwa_dismissed');
      if (dismissedTime) {
        var elapsed = Date.now() - parseInt(dismissedTime, 10);
        if (elapsed < 7 * 24 * 60 * 60 * 1000) {
          setDismissed(true);
          return;
        }
      }

      if (window.matchMedia('(display-mode: standalone)').matches) {
        return;
      }

      var handler = function(e) {
        e.preventDefault();
        setDeferredPrompt(e);
        setVisible(true);
      };

      window.addEventListener('beforeinstallprompt', handler);

      var installedHandler = function() {
        setVisible(false);
        setDeferredPrompt(null);
      };
      window.addEventListener('appinstalled', installedHandler);

      return function() {
        window.removeEventListener('beforeinstallprompt', handler);
        window.removeEventListener('appinstalled', installedHandler);
      };
    }, []);

    var handleInstall = React.useCallback(function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result) {
        if (result.outcome === 'accepted') {
          setVisible(false);
          setDeferredPrompt(null);
        }
      }).catch(function(err) {
        console.warn('PWA install prompt failed:', err);
      });
    }, [deferredPrompt]);

    var handleDismiss = React.useCallback(function() {
      setVisible(false);
      setDismissed(true);
      localStorage.setItem('dopamine_pwa_dismissed', String(Date.now()));
    }, []);

    if (!visible || dismissed) return null;

    return h('div', { className: 'pwa-banner' },
      h('span', { style: { fontSize: '28px', flexShrink: 0 } }, '📲'),
      h('div', { className: 'pwa-banner-text' }, window.T('install.text')),
      h('button', { className: 'pwa-banner-btn', onClick: handleInstall }, window.T('install.install')),
      h('button', { className: 'pwa-banner-close', onClick: handleDismiss, 'aria-label': 'Close' }, '✕')
    );
  }
  window.PwaBanner = PwaBanner;

    }

    function formatPrice(n) { return '¥'+n; }

    if (loading) return h('div',{className:'p-16 text-center',style:{paddingTop:60}},h('p',null,'加载中...'));
    if (!stores.length) return h('div',{className:'empty-state'},h('div',{className:'empty-state-icon'},'💆'),h('p',null,'暂无SPA服务'));

    // LAYER 3: Product detail
    if (selectedProduct) {
      var p = selectedProduct;
      var specsObj = p.specs || {};
      var specsArr = Object.entries(specsObj);
      var reviews = p.reviews || [];
      return h('div',null,
        h('button',{onClick:function(){setSelectedProduct(null);},style:{padding:8,background:'none',border:'none',fontSize:16,cursor:'pointer',fontFamily:'inherit',color:'var(--text-secondary)'}},'← 返回'),
        p.image?h('img',{src:p.image,alt:p.name,style:{width:'100%',borderRadius:'var(--radius)',marginTop:8}}):null,
        h('h2',{style:{margin:'12px 0 4px',fontSize:20}},p.name),
        h('div',{style:{fontSize:22,fontWeight:700,color:'var(--primary)',marginBottom:8}},formatPrice(p.price)),
        h('p',{style:{color:'var(--text-secondary)',fontSize:13,lineHeight:1.6,marginBottom:12}},p.desc),
        h('h3',{style:{fontSize:14,marginBottom:6}},'服务详情'),
        h('div',{style:{background:'var(--bg)',borderRadius:'var(--radius-sm)',padding:12,marginBottom:12}},
          specsArr.map(function(e){return h('div',{key:e[0],style:{display:'flex',padding:'4px 0',fontSize:12,borderBottom:'1px solid var(--border)'}},h('span',{style:{color:'var(--text-light)',width:60,flexShrink:0}},e[0]),h('span',{style:{flex:1}},e[1]));})
        ),
        h('button',{onClick:function(){handleAdd(p,selectedStore.name);},style:{width:'100%',padding:12,borderRadius:24,border:'none',background:'var(--primary)',color:'#FFF',fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'inherit',marginBottom:16}},'+ 加入预约'),
        reviews.length>0?h('div',null,
          h('h3',{style:{fontSize:14,marginBottom:8}},'用户评价 ('+reviews.length+')'),
          reviews.map(function(r,i){return h('div',{key:i,style:{background:'var(--bg)',borderRadius:'var(--radius-sm)',padding:12,marginBottom:8}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
              h('div',{style:{width:28,height:28,borderRadius:14,background:'hsl('+(i*137%360)+',50%,70%)',display:'flex',alignItems:'center',justifyContent:'center',color:'#FFF',fontSize:12,fontWeight:700}},r.user.charAt(0)),
              h('span',{style:{fontWeight:600,fontSize:13}},r.user),
              h('span',{style:{color:'var(--gold)',fontSize:12}},'★'.repeat(r.rating)+'☆'.repeat(5-r.rating)),
              h('span',{style:{color:'var(--text-light)',fontSize:11,marginLeft:'auto'}},r.date)
            ),
            h('p',{style:{fontSize:12,color:'var(--text-secondary)',lineHeight:1.5}},r.content)
          );})
        ):null
      );
    }

    // LAYER 2: Products within a store
    if (selectedStore) {
      var s = selectedStore;
      return h('div',null,
        h('button',{onClick:function(){setSelectedStore(null);},style:{padding:8,background:'none',border:'none',fontSize:16,cursor:'pointer',fontFamily:'inherit',color:'var(--text-secondary)'}},'← 全部SPA'),
        s.image?h('img',{src:s.image,alt:s.name,style:{width:'100%',borderRadius:'var(--radius)',marginTop:8,objectFit:'cover',maxHeight:180}}):null,
        h('h2',{style:{margin:'12px 0 4px',fontSize:18}},s.name),
        h('p',{style:{color:'var(--text-light)',fontSize:12,marginBottom:12}},s.desc),
        h('div',{className:'product-grid'},
          (s.products||[]).map(function(product,idx){
            var isAdded = addedAnim[product.id];
            return h('div',{key:product.id||idx,className:'product-card animate-in',style:{animationDelay:(idx*60)+'ms'},onClick:function(){setSelectedProduct(product);}},
              h('div',{className:'product-img-wrap'},
                product.image?h('img',{className:'product-img',src:product.image,alt:product.name,loading:'lazy'}):h('div',{className:'product-img-fallback',style:{display:'flex'}},'💆')
              ),
              h('div',{className:'product-body'},
                h('div',{className:'product-name'},product.name),
                h('div',{className:'product-price-row'},h('span',{className:'product-price'},formatPrice(product.price))),
                h('button',{className:'btn-add-cart'+(isAdded?' added':''),onClick:function(e){e.stopPropagation();handleAdd(product,s.name);}},isAdded?'✓ 已预约':'+ 预约')
              )
            );
          })
        )
      );
    }

    // LAYER 1: Store list
    return h('div',null,
      h('div',{style:{padding:'12px 16px 4px'}},h('h2',{style:{fontSize:16,fontWeight:600}},'💆 做SPA ('+stores.length+')')),
      h('div',{className:'product-grid'},
        stores.map(function(store,idx){
          return h('div',{key:store.id||idx,className:'product-card animate-in',style:{animationDelay:(idx*60)+'ms',cursor:'pointer'},onClick:function(){setSelectedStore(store);}},
            h('div',{className:'product-img-wrap'},
              store.image?h('img',{className:'product-img',src:store.image,alt:store.name,loading:'lazy'}):h('div',{className:'product-img-fallback',style:{display:'flex'}},'💆')
            ),
            h('div',{className:'product-body'},
              h('div',{className:'product-name'},store.name),
              h('div',{style:{fontSize:11,color:'var(--text-light)',marginTop:2}},store.desc),
              h('div',{style:{fontSize:12,color:'var(--primary)',marginTop:4,fontWeight:600}},(store.products||[]).length+' 个项目')
            )
          );
        })
      )
    );
  }
  window.SpaScene = SpaScene;

  // ===== App (main state manager) =====
  function App() {
    var pageState = React.useState('home');
    var currentPage = pageState[0], setCurrentPage = pageState[1];
    var storeState = React.useState(null);
    var selectedStore = storeState[0], setSelectedStore = storeState[1];
    var cartState = React.useState([]);
    var cartItems = cartState[0], setCartItems = cartState[1];
    var restState = React.useState([]);
    var restaurants = restState[0], setRestaurants = restState[1];
    var statsState = React.useState(function() {
      return {
        saved: parseFloat(localStorage.getItem('dopamine_saved') || '0'),
        orders: parseInt(localStorage.getItem('dopamine_orders') || '0', 10),
        streak: parseInt(localStorage.getItem('dopamine_streak') || '0', 10),
        lastDate: localStorage.getItem('dopamine_lastdate') || ''
      };
    });
    var stats = statsState[0], setStats = statsState[1];
    var toastState = React.useState('');
    var toast = toastState[0], setToast = toastState[1];
    var cartOpenState = React.useState(false);
    var cartOpen = cartOpenState[0], setCartOpen = cartOpenState[1];
    var keyState = React.useState(0);
    var renderKey = keyState[0], setRenderKey = keyState[1];
    var tabState = React.useState('food');
    var currentTab = tabState[0], setCurrentTab = tabState[1];
    var lastOrderState = React.useState(null);
    var lastOrder = lastOrderState[0], setLastOrder = lastOrderState[1];

    // Language change listener
    React.useEffect(function() {
      var handler = function() { setRenderKey(function(k) { return k + 1; }); };
      window.addEventListener('langchange', handler);
      return function() { window.removeEventListener('langchange', handler); };
    }, []);

    // Init language
    React.useEffect(function() {
      window.__LANG__ = localStorage.getItem('dopamine_lang') || 'zh';
    }, []);

    // Load restaurants
    React.useEffect(function() {
      fetch('/data/restaurants.json')
        .then(function(res) { return res.json(); })
        .then(function(data) { setRestaurants(data.map(normRestaurant)); })
        .catch(function() {
          console.warn('[App] Failed to load /data/restaurants.json');
          setRestaurants([]);
        });
    }, []);

    // Toast
    var showToast = React.useCallback(function(msg) {
      setToast(msg);
      setTimeout(function() { setToast(''); }, 2000);
    }, []);

    // Cart operations
    var addItem = React.useCallback(function(item, store) {
      setCartItems(function(prev) {
        var existing = prev.find(function(i) { return i.id === item.id && i.storeId === store.id; });
        if (existing) {
          return prev.map(function(i) {
            return i.id === item.id && i.storeId === store.id ? Object.assign({}, i, { qty: i.qty + 1 }) : i;
          });
        }
        return prev.concat([{
          id: item.id, storeId: store.id, storeName: store.name,
          name: item.name, price: item.price, qty: 1
        }]);
      });
      showToast(window.T('toast.added'));
    }, [showToast]);

    var handleRemove = React.useCallback(function(itemId) {
      setCartItems(function(prev) { return prev.filter(function(i) { return i.id !== itemId; }); });
      showToast(window.T('toast.removed'));
    }, [showToast]);

    var handleUpdateQty = React.useCallback(function(itemId, newQty) {
      setCartItems(function(prev) {
        if (newQty <= 0) return prev.filter(function(i) { return i.id !== itemId; });
        return prev.map(function(i) { return i.id === itemId ? Object.assign({}, i, { qty: newQty }) : i; });
      });
    }, []);

    var cartTotal = React.useMemo(function() {
      return cartItems.reduce(function(sum, i) { return sum + i.price * i.qty; }, 0);
    }, [cartItems]);

    // Navigation
    var navigateTo = React.useCallback(function(page, store) {
      window.scrollTo(0, 0);
      setCurrentPage(page);
      setCartOpen(false);
      if (store) setSelectedStore(store);
      if (page === 'home') setSelectedStore(null);
    }, []);

    // Tracking data ref (cross-page order data)
    var trackingData = React.useRef({ cartItems: [], savedAmount: 0, orderId: '' });

    // Place order (fake payment) → go to tracking
    var placeOrder = React.useCallback(function() {
      var savedAmount = cartTotal;
      var orderId = 'JV' + Date.now().toString(36).toUpperCase();
      // Save order details for tracking page
      trackingData.current = {
        cartItems: cartItems.map(function(i) { return Object.assign({}, i); }),
        savedAmount: savedAmount,
        orderId: orderId
      };
      // Also save for success/share page
      var orderData = {
        items: cartItems.map(function(i) { return Object.assign({}, i); }),
        total: cartTotal,
        time: new Date().toLocaleString('zh-CN', { hour12: false }),
        orderId: orderId
      };
      setLastOrder(orderData);
      setCurrentPage('paying');
      setTimeout(function() {
        setStats(function(prev) {
          var today = new Date().toISOString().slice(0, 10);
          var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
          var newStreak = prev.lastDate === yesterday ? prev.streak + 1 : (prev.lastDate === today ? prev.streak : 1);
          var newStats = {
            saved: prev.saved + savedAmount,
            orders: prev.orders + 1,
            streak: newStreak,
            lastDate: today
          };
          localStorage.setItem('dopamine_saved', String(newStats.saved));
          localStorage.setItem('dopamine_orders', String(newStats.orders));
          localStorage.setItem('dopamine_streak', String(newStats.streak));
          localStorage.setItem('dopamine_lastdate', newStats.lastDate);
          window.dispatchEvent(new CustomEvent('statsupdate'));
          return newStats;
        });
        setCartItems([]);
        setCurrentPage('tracking');
      }, 1500);
    }, [cartTotal, cartItems]);

    var handleGoHome = React.useCallback(function() {
      navigateTo('home');
    }, [navigateTo]);

    // Render current page
    function renderPage() {
      switch (currentPage) {
        case 'paying':
          return h('div', {
            style: {
              display: 'flex', flexDirection: 'column', alignItems: 'center',
              justifyContent: 'center', height: '70vh', gap: 20
            }
          },
            h('div', {
              style: {
                width: 48, height: 48, border: '4px solid var(--border)',
                borderTopColor: 'var(--primary)', borderRadius: '50%',
                animation: 'spin 0.8s linear infinite'
              }
            }),
            h('p', { style: { color: 'var(--text-secondary)', fontSize: 14 } }, window.T('order.submit') + '...'),
            h('p', { style: { fontSize: 12, color: 'var(--text-light)' } }, '(假的支付，放心~)')
          );

        case 'store':
          return window.StorePage ?
            h(window.StorePage, {
              store: selectedStore,
              cartItems: cartItems,
              onAddItem: addItem,
              onGoBack: function() { navigateTo('home'); },
              key: (selectedStore && selectedStore.id) || 'store'
            })
          :
            h(Fallback, { msg: 'StorePage 组件未加载' });

        case 'checkout':
          return window.CheckoutScene ?
            h(window.CheckoutScene, {
              cartItems: cartItems,
              cartTotal: cartTotal,
              onPlaceOrder: placeOrder,
              onCancel: function() { navigateTo('home'); }
            })
          :
            h(Fallback, { msg: 'CheckoutScene 组件未加载' });

        case 'success':
          return window.OrderSuccess ?
            h(window.OrderSuccess, {
              savedAmount: trackingData.current ? trackingData.current.savedAmount : (cartTotal || stats.saved),
              stats: stats,
              onGoHome: handleGoHome,
              orderData: lastOrder,
              key: renderKey
            })
          :
            h(Fallback, { msg: 'OrderSuccess 组件未加载' });

        case 'tracking':
          return window.OrderTracking ?
            h(window.OrderTracking, {
              cartItems: trackingData.current ? trackingData.current.cartItems : [],
              savedAmount: trackingData.current ? trackingData.current.savedAmount : 0,
              orderId: trackingData.current ? trackingData.current.orderId : ('DP' + Date.now().toString(36).toUpperCase()),
              onGoHome: handleGoHome,
              key: renderKey
            })
          :
            h(Fallback, { msg: 'OrderTracking 组件未加载' });

        case 'home':
        default:
          if (currentTab === 'dutyfree') {
            return window.DutyFreeScene ?
              h(window.DutyFreeScene, {
                cartItems: cartItems,
                onAddItem: addItem,
                key: renderKey
              })
            :
              h(Fallback, { msg: 'DutyFreeScene 组件未加载' });
          }
          if (currentTab === 'spa') {
            return window.SpaScene ?
              h(window.SpaScene, {
                cartItems: cartItems,
                onAddItem: addItem,
                key: renderKey
              })
            :
              h(Fallback, { msg: 'SpaScene 组件未加载' });
          }
          return window.FoodHome ?
            h(window.FoodHome, {
              restaurants: restaurants,
              stats: stats,
              onSelectStore: function(store) { navigateTo('store', store); },
              key: renderKey
            })
          :
            h(Fallback, { msg: 'FoodHome 组件未加载' });
      }
    }

    // Main cart count
    var cartCount = cartItems.reduce(function(s, i) { return s + i.qty; }, 0);

    return h('div', { style: { minHeight: '100vh', minHeight: '100dvh', display: 'flex', flexDirection: 'column' } },
      // Header
      window.Header ?
        h(window.Header, { key: renderKey })
      :
        h('header', { className: 'app-header row', style: { justifyContent: 'space-between' } },
          h('div', { style: { cursor: 'pointer' } },
            h('h1', null, window.T('app.title')),
            h('div', { className: 'subtitle' }, window.T('app.subtitle'))
          )
        ),

      // Main content
      h('main', { style: { flex: 1, paddingBottom: (currentPage === 'home' ? 70 : (cartItems.length > 0 && !cartOpen ? 80 : 16)) } },
        renderPage()
      ),

      // Toast
      toast ? h('div', { className: 'toast', key: toast }, toast) : null,

      // Bottom Tab Bar (only on home, 3 tabs)
      currentPage === 'home' ?
        h('div', { className: 'tab-bar' },
          h('button', {
            className: 'tab-item' + (currentTab === 'food' ? ' active' : ''),
            onClick: function() { setCurrentTab('food'); }
          },
            h('span', { className: 'tab-icon' }, '🍜'),
            h('span', null, '上馆子')
          ),
          h('button', {
            className: 'tab-item' + (currentTab === 'spa' ? ' active' : ''),
            onClick: function() { setCurrentTab('spa'); }
          },
            h('span', { className: 'tab-icon' }, '💆'),
            h('span', null, '做SPA')
          ),
          h('button', {
            className: 'tab-item' + (currentTab === 'dutyfree' ? ' active' : ''),
            onClick: function() { setCurrentTab('dutyfree'); }
          },
            h('span', { className: 'tab-icon' }, '🛍️'),
            h('span', null, '免税店')
          )
        )
      : null,

      // Cart FAB
      cartItems.length > 0 && currentPage !== 'checkout' && currentPage !== 'success' && currentPage !== 'paying' && currentPage !== 'tracking' ?
        h('button', {
          className: 'cart-fab',
          onClick: function() { setCartOpen(function(prev) { return !prev; }); },
          style: { animation: cartOpen ? 'none' : 'pulse 2s infinite' }
        },
          '🛒',
          h('span', { className: 'cart-badge' }, String(cartCount))
        )
      : null,

      // Cart Panel
      window.CartPanel ?
        h(window.CartPanel, {
          cartItems: cartItems,
          visible: cartOpen,
          onUpdateQty: handleUpdateQty,
          onRemove: handleRemove,
          onCheckout: function() { setCartOpen(false); navigateTo('checkout'); },
          onClose: function() { setCartOpen(false); }
        })
      : null,

      // PWA Banner
      window.PwaBanner ? h(window.PwaBanner, null) : null
    );
  }

  // ===== Fallback component =====
  function Fallback(props) {
    return h('div', { className: 'p-16 text-center', style: { color: 'var(--text-secondary)', paddingTop: 60 } },
      h('p', null, props.msg)
    );
  }

  window.App = App;

  // ===== Mount =====
  function mount() {
    var rootEl = document.getElementById('root');
    if (rootEl) {
      var root = ReactDOM.createRoot(rootEl);
      root.render(h(App, null));
    }
  }

  document.addEventListener('DOMContentLoaded', mount);

  if (document.readyState === 'interactive' || document.readyState === 'complete') {
    mount();
  }

})();
</script>

</body>
</html>
