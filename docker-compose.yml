services:
  nginx:
    image: nginx:alpine
    container_name: dopamine-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /tmp/acme-challenge:/tmp/acme-challenge:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
